spring:
  application:
    name: watch-together-backend
  jackson:
    deserialization:
      fail-on-unknown-properties: true
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:watch_together_redis_dev_only}

server:
  port: 8080

watch-together:
  rooms:
    ttl: ${ROOM_TTL:4h}
    session-cookie-secure: ${SESSION_COOKIE_SECURE:false}
    cleanup-grace: ${ROOM_CLEANUP_GRACE:5m}
  websocket:
    presence-ttl: ${WEBSOCKET_PRESENCE_TTL:30s}
    chat-rate-limit: ${WEBSOCKET_CHAT_RATE_LIMIT:5}
    chat-rate-window: ${WEBSOCKET_CHAT_RATE_WINDOW:5s}
    host-reconnect-grace: ${WEBSOCKET_HOST_RECONNECT_GRACE:60s}
  livekit:
    url: ${LIVEKIT_URL:ws://127.0.0.1:7880}
    api-key: ${LIVEKIT_API_KEY:devkey}
    api-secret: ${LIVEKIT_API_SECRET:devsecretdevsecretdevsecretdevsecret}
    token-ttl: ${LIVEKIT_TOKEN_TTL:10m}
  feedback:
    # WT-605 operator endpoints are disabled until this token is configured.
    admin-token: ${FEEDBACK_ADMIN_TOKEN:}
    retention: ${FEEDBACK_RETENTION:30d}
    export-limit: ${FEEDBACK_EXPORT_LIMIT:200}
  rate-limit:
    # Redis-backed per-client-IP limits on the public mutating endpoints (WT-606).
    # Defaults are generous for real use but cap abuse/runaway LiveKit cost in the beta.
    enabled: ${RATE_LIMIT_ENABLED:true}
    create-room:
      requests: ${RATE_LIMIT_CREATE_ROOM:10}
      window: ${RATE_LIMIT_CREATE_ROOM_WINDOW:1m}
    join-room:
      requests: ${RATE_LIMIT_JOIN_ROOM:20}
      window: ${RATE_LIMIT_JOIN_ROOM_WINDOW:1m}
    livekit-token:
      requests: ${RATE_LIMIT_LIVEKIT_TOKEN:30}
      window: ${RATE_LIMIT_LIVEKIT_TOKEN_WINDOW:1m}
    feedback:
      requests: ${RATE_LIMIT_FEEDBACK:10}
      window: ${RATE_LIMIT_FEEDBACK_WINDOW:1m}
    telemetry:
      requests: ${RATE_LIMIT_TELEMETRY:60}
      window: ${RATE_LIMIT_TELEMETRY_WINDOW:1m}

management:
  endpoints:
    web:
      exposure:
        # metrics/prometheus are for internal scraping — keep them behind the security
        # chain (not in SecurityConfig permitAll) and/or a separate management port.
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
