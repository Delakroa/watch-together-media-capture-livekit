openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema

info:
  title: Watch Together REST API
  version: 1.0.0
  description: |
    Контракт product backend. Эндпоинты с `x-implementation-status: planned`
    фиксируют согласованную будущую API surface и не считаются реализованными до
    соответствующего тикета.

servers:
  - url: /
    description: Same-origin API через development или production reverse proxy

tags:
  - name: System
    description: Системные endpoints
  - name: Rooms
    description: Жизненный цикл приватной комнаты
  - name: Feedback
    description: Обратная связь closed beta и operator triage
  - name: Telemetry
    description: Privacy-safe client telemetry для beta-метрик
  - name: Internet access
    description: Planned account, membership и отзываемые invite для public Internet mode

paths:
  /api/v1/health:
    get:
      tags: [System]
      operationId: getHealth
      summary: Проверить доступность backend
      x-implementation-status: implemented
      responses:
        "200":
          description: Backend доступен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/version:
    get:
      tags: [System]
      operationId: getVersion
      summary: Получить версию backend
      x-implementation-status: implemented
      responses:
        "200":
          description: Версия backend
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"

  /api/v1/feedback:
    post:
      tags: [Feedback]
      operationId: submitFeedback
      summary: Принять обратную связь по beta-сессии
      description: |
        Endpoint принимает короткий session feedback и optional privacy-safe browser/network
        metadata. Он не принимает медиафайлы, chat history, room secrets или LiveKit tokens.
      x-implementation-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackRequest"
      responses:
        "202":
          description: Отзыв принят и получил correlation-friendly receipt
          headers:
            Cache-Control:
              description: Ответ содержит диагностический receipt и не должен кэшироваться
              schema:
                type: string
                const: no-store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/feedback/reports:
    get:
      tags: [Feedback]
      operationId: listFeedbackReports
      summary: Получить последние beta feedback reports
      description: |
        Operator endpoint для регулярного triage. Доступен только при настроенном
        `FEEDBACK_ADMIN_TOKEN` и корректном header `X-Feedback-Admin-Token`.
      x-implementation-status: implemented
      security:
        - feedbackAdminToken: []
      parameters:
        - $ref: "#/components/parameters/FeedbackLimit"
      responses:
        "200":
          description: Последние reports в компактном виде
          headers:
            Cache-Control:
              description: Operator данные не кэшируются
              schema:
                type: string
                const: no-store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackReportListResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/feedback/reports/export:
    get:
      tags: [Feedback]
      operationId: exportFeedbackReports
      summary: Выгрузить последние beta feedback reports
      description: |
        Operator export для ручного разбора beta-прогона. Возвращает полные reports
        в пределах `FEEDBACK_EXPORT_LIMIT`; медиа, chat history, room secrets и LiveKit
        tokens здесь не хранятся и не возвращаются.
      x-implementation-status: implemented
      security:
        - feedbackAdminToken: []
      parameters:
        - $ref: "#/components/parameters/FeedbackLimit"
      responses:
        "200":
          description: Последние reports в полном виде
          headers:
            Cache-Control:
              description: Operator данные не кэшируются
              schema:
                type: string
                const: no-store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackReportExportResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/feedback/reports/{feedbackId}:
    parameters:
      - $ref: "#/components/parameters/FeedbackId"
    get:
      tags: [Feedback]
      operationId: getFeedbackReport
      summary: Получить один beta feedback report
      x-implementation-status: implemented
      security:
        - feedbackAdminToken: []
      responses:
        "200":
          description: Полный report
          headers:
            Cache-Control:
              description: Operator данные не кэшируются
              schema:
                type: string
                const: no-store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackReport"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags: [Feedback]
      operationId: triageFeedbackReport
      summary: Обновить triage поля beta feedback report
      x-implementation-status: implemented
      security:
        - feedbackAdminToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackTriageRequest"
      responses:
        "200":
          description: Report после triage update
          headers:
            Cache-Control:
              description: Operator данные не кэшируются
              schema:
                type: string
                const: no-store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackReport"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/telemetry:
    post:
      tags: [Telemetry]
      operationId: submitTelemetry
      summary: Принять батч privacy-safe client telemetry
      description: |
        Endpoint принимает батч client telemetry событий (first frame, publish/playback
        ошибки, quality summary) для агрегированных beta-метрик. Он не принимает медиафайлы,
        chat history, room secrets, LiveKit tokens или identity данные. Каждое событие даёт
        только aggregate counter и low-cardinality tag; roomId, role и detail используются
        лишь для log-корреляции и никогда не становятся метрик-тегами.
      x-implementation-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelemetryRequest"
      responses:
        "202":
          description: Батч принят и получил correlation-friendly receipt
          headers:
            Cache-Control:
              description: Ответ содержит диагностический receipt и не должен кэшироваться
              schema:
                type: string
                const: no-store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelemetryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/rooms:
    post:
      tags: [Rooms]
      operationId: createRoom
      summary: Создать приватную комнату
      x-implementation-status: implemented
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoomRequest"
      responses:
        "201":
          description: Комната создана, host session установлена
          headers:
            Set-Cookie:
              $ref: "#/components/headers/SessionCookie"
            Location:
              description: API-адрес созданной комнаты
              schema:
                type: string
                pattern: ^/api/v1/rooms/
            Cache-Control:
              description: Ответ содержит credentials и не должен кэшироваться
              schema:
                type: string
                const: no-store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRoomResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/rooms/{roomId}:
    parameters:
      - $ref: "#/components/parameters/RoomId"
    get:
      tags: [Rooms]
      operationId: getRoom
      summary: Восстановить room session и authoritative snapshot
      x-implementation-status: implemented
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Текущий participant и snapshot комнаты для активной browser session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRoomResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/RoomUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/rooms/{roomId}/join:
    parameters:
      - $ref: "#/components/parameters/RoomId"
    post:
      tags: [Rooms]
      operationId: joinRoom
      summary: Присоединить гостя к комнате
      x-implementation-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinRoomRequest"
      responses:
        "200":
          description: Гость присоединён или его session identity восстановлена
          headers:
            Set-Cookie:
              $ref: "#/components/headers/SessionCookie"
            Cache-Control:
              description: Ответ содержит session credential и не должен кэшироваться
              schema:
                type: string
                const: no-store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JoinRoomResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/RoomUnavailable"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/rooms/{roomId}/leave:
    parameters:
      - $ref: "#/components/parameters/RoomId"
    post:
      tags: [Rooms]
      operationId: leaveRoom
      summary: Покинуть комнату от имени guest
      x-implementation-status: implemented
      security:
        - sessionCookie: []
      responses:
        "204":
          description: Guest participant покинул комнату
          headers:
            Cache-Control:
              description: Ответ не должен кэшироваться
              schema:
                type: string
                const: no-store
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/RoomUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/rooms/{roomId}/livekit-token:
    parameters:
      - $ref: "#/components/parameters/RoomId"
    post:
      tags: [Rooms]
      operationId: mintLiveKitToken
      summary: Выдать LiveKit token для текущего participant
      x-implementation-status: implemented
      security:
        - sessionCookie: []
      responses:
        "200":
          description: LiveKit token с grants, соответствующими роли текущего participant
          headers:
            Cache-Control:
              description: Ответ содержит credential и не должен кэшироваться
              schema:
                type: string
                const: no-store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveKitTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/RoomUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/rooms/{roomId}/close:
    parameters:
      - $ref: "#/components/parameters/RoomId"
    post:
      tags: [Rooms]
      operationId: closeRoom
      summary: Закрыть комнату от имени host
      x-implementation-status: implemented
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/HostSecret"
      responses:
        "204":
          description: Комната закрыта или уже была закрыта
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/RoomUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v2/auth/email-challenges:
    post:
      tags: [Internet access]
      operationId: requestEmailChallenge
      summary: Запросить одноразовый email challenge для Internet mode
      description: |
        Planned endpoint. Возвращает одинаковый `202` для нового и существующего
        email, чтобы не стать account-enumeration oracle. Одноразовый код
        передаётся только через будущего configured email provider.
      x-implementation-status: planned
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailChallengeRequest"
      responses:
        "202":
          description: Challenge принят к доставке без раскрытия account state
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailChallengeAccepted"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v2/auth/email-challenges/{challengeId}/verify:
    parameters:
      - $ref: "#/components/parameters/EmailChallengeId"
    post:
      tags: [Internet access]
      operationId: verifyEmailChallenge
      summary: Подтвердить одноразовый email challenge
      description: |
        Planned endpoint. Успех создаёт или восстанавливает account и ставит
        отдельную opaque `wt_account` cookie. Raw code не возвращается в response
        и не сохраняется в browser storage.
      x-implementation-status: planned
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailChallengeRequest"
      responses:
        "200":
          description: Email подтверждён, account session установлена
          headers:
            Set-Cookie:
              $ref: "#/components/headers/AccountSessionCookie"
            Cache-Control:
              $ref: "#/components/headers/NoStore"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/ChallengeRejected"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v2/account:
    get:
      tags: [Internet access]
      operationId: getAccount
      summary: Получить профиль текущего Internet-mode account
      x-implementation-status: planned
      security:
        - accountSessionCookie: []
      responses:
        "200":
          description: Минимальный account profile без email и credentials
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v2/public-rooms:
    post:
      tags: [Internet access]
      operationId: createPublicRoom
      summary: Создать private Internet-mode room
      description: |
        Planned endpoint. Создаёт только product access record; фильм, локальный
        path и LiveKit credential не передаются в request и не возвращаются.
      x-implementation-status: planned
      security:
        - accountSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePublicRoomRequest"
      responses:
        "201":
          description: Public room создана, owner membership активна
          headers:
            Location:
              description: API-адрес созданной public room
              schema:
                type: string
                pattern: ^/api/v2/public-rooms/
            Cache-Control:
              $ref: "#/components/headers/NoStore"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicRoomAccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/AccountLimitReached"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v2/public-rooms/{publicRoomId}:
    parameters:
      - $ref: "#/components/parameters/PublicRoomId"
    get:
      tags: [Internet access]
      operationId: getPublicRoom
      summary: Получить public room только для её member-а
      x-implementation-status: planned
      security:
        - accountSessionCookie: []
      responses:
        "200":
          description: Authoritative public room access snapshot
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicRoomAccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/MembershipRequired"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v2/public-rooms/{publicRoomId}/livekit-token:
    parameters:
      - $ref: "#/components/parameters/PublicRoomId"
    post:
      tags: [Internet access]
      operationId: mintPublicRoomLiveKitToken
      summary: Выдать краткоживущий LiveKit token только public room member-у
      description: |
        Planned endpoint. Account membership проверяется до выпуска token; revoke
        запрещает новые tokens и будущая runtime-реализация удаляет participant
        через LiveKit Server API.
      x-implementation-status: planned
      security:
        - accountSessionCookie: []
      responses:
        "200":
          description: Краткоживущий LiveKit JWT с grants текущей media-роли
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveKitTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/MembershipRequired"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v2/public-rooms/{publicRoomId}/invites:
    parameters:
      - $ref: "#/components/parameters/PublicRoomId"
    post:
      tags: [Internet access]
      operationId: createPublicRoomInvite
      summary: Создать отзываемый invite для private Internet-mode room
      description: |
        Planned endpoint. Raw invite token возвращается только в этом `no-store`
        response как hash-only browser route. В storage и дальнейших ответах
        остаются только invite ID и hash token-а.
      x-implementation-status: planned
      security:
        - accountSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePublicInviteRequest"
      responses:
        "201":
          description: Invite создан, raw token больше не будет доступен через API
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicInviteCreated"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/MembershipRequired"
        "409":
          $ref: "#/components/responses/AccountLimitReached"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v2/public-rooms/{publicRoomId}/invites/{inviteId}/revoke:
    parameters:
      - $ref: "#/components/parameters/PublicRoomId"
      - $ref: "#/components/parameters/PublicInviteId"
    post:
      tags: [Internet access]
      operationId: revokePublicRoomInvite
      summary: Отозвать public room invite
      x-implementation-status: planned
      security:
        - accountSessionCookie: []
      responses:
        "204":
          description: Invite отозван или уже неактивен
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/MembershipRequired"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v2/public-rooms/{publicRoomId}/members/{accountId}/revoke:
    parameters:
      - $ref: "#/components/parameters/PublicRoomId"
      - $ref: "#/components/parameters/AccountId"
    post:
      tags: [Internet access]
      operationId: revokePublicRoomMember
      summary: Удалить member-а из private Internet-mode room
      x-implementation-status: planned
      security:
        - accountSessionCookie: []
      responses:
        "204":
          description: Membership удалена или уже неактивна; active participant отключён
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/MembershipRequired"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v2/invite-redemptions:
    post:
      tags: [Internet access]
      operationId: redeemPublicInvite
      summary: Обменять hash-only invite token на membership
      description: |
        Planned endpoint. Invite token приходит только в POST body, а не в
        server-visible URL/query. Ответ не содержит LiveKit credential.
      x-implementation-status: planned
      security:
        - accountSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedeemPublicInviteRequest"
      responses:
        "200":
          description: Account получил или восстановил membership
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicRoomAccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/InviteUnavailable"
        "409":
          $ref: "#/components/responses/AccountLimitReached"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: wt_session
      description: |
        Opaque session credential. Production cookie: HttpOnly, Secure, SameSite=Strict.
    accountSessionCookie:
      type: apiKey
      in: cookie
      name: wt_account
      description: |
        Planned opaque account credential for Internet mode. Не заменяет
        `wt_session` и не передаётся в URL, JavaScript storage или WebSocket query.
    feedbackAdminToken:
      type: apiKey
      in: header
      name: X-Feedback-Admin-Token
      description: Operator token from `FEEDBACK_ADMIN_TOKEN`; disabled when env is empty.

  parameters:
    RoomId:
      name: roomId
      in: path
      required: true
      schema:
        $ref: "./schemas/common.schema.json#/$defs/RoomId"
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Повтор того же запроса возвращает исходный результат; другой payload даёт conflict.
      schema:
        type: string
        minLength: 16
        maxLength: 128
        pattern: ^[!-~]+$
    HostSecret:
      name: X-Host-Secret
      in: header
      required: true
      description: Opaque host secret. Никогда не помещается в invite URL или логи.
      schema:
        type: string
        minLength: 43
        maxLength: 128
        pattern: ^[A-Za-z0-9_-]+$
    FeedbackId:
      name: feedbackId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    FeedbackLimit:
      name: limit
      in: query
      required: false
      description: Ограничение размера выборки; backend clamp-ит значение к FEEDBACK_EXPORT_LIMIT.
      schema:
        type: integer
        minimum: 1
        maximum: 1000
    EmailChallengeId:
      name: challengeId
      in: path
      required: true
      description: Opaque ID challenge; не является account ID или email.
      schema:
        type: string
        format: uuid
    PublicRoomId:
      name: publicRoomId
      in: path
      required: true
      description: Persistent public access record, отдельный от текущего LAN roomId.
      schema:
        type: string
        format: uuid
    PublicInviteId:
      name: inviteId
      in: path
      required: true
      description: Invite record ID; raw token в path не передаётся.
      schema:
        type: string
        format: uuid
    AccountId:
      name: accountId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  headers:
    SessionCookie:
      description: HttpOnly session cookie; Secure обязателен вне локальной разработки.
      schema:
        type: string
    AccountSessionCookie:
      description: Planned HttpOnly `wt_account` cookie; Secure и SameSite=Strict обязательны.
      schema:
        type: string
    NoStore:
      description: Ответ содержит access state или credential и не должен кэшироваться.
      schema:
        type: string
        const: no-store

  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, checkedAt]
      properties:
        status:
          type: string
          const: UP
        checkedAt:
          type: string
          format: date-time

    VersionResponse:
      type: object
      additionalProperties: false
      required: [name, version, buildTime, apiVersion]
      properties:
        name:
          type: string
          minLength: 1
        version:
          type: string
          minLength: 1
        buildTime:
          type: string
          minLength: 1
        apiVersion:
          type: string
          const: v1

    FeedbackOutcome:
      type: string
      enum: [WORKED, ISSUE, BLOCKED]

    FeedbackReason:
      type: string
      enum:
        - SUCCESS
        - CONNECTION
        - AUDIO_VIDEO
        - FILE
        - VOICE
        - SYNC
        - CHAT
        - ROOM_ACCESS
        - PERFORMANCE
        - OTHER

    FeedbackClientMetadata:
      type: object
      additionalProperties: false
      properties:
        userAgent:
          type: string
          maxLength: 512
        language:
          type: string
          maxLength: 32
        platform:
          type: string
          maxLength: 64
        viewportWidth:
          type: integer
          minimum: 0
          maximum: 10000
        viewportHeight:
          type: integer
          minimum: 0
          maximum: 10000
        devicePixelRatio:
          type: number
          minimum: 0
          maximum: 10
        networkEffectiveType:
          type: string
          maxLength: 32
        networkDownlinkMbps:
          type: number
          minimum: 0
          maximum: 10000
        networkRttMs:
          type: integer
          minimum: 0
          maximum: 60000
        networkSaveData:
          type: boolean
        roomStatus:
          type: string
          maxLength: 32
        roomConnectionStatus:
          type: string
          maxLength: 32
        liveKitStatus:
          type: string
          maxLength: 32
        qualityStatus:
          type: string
          maxLength: 32
        participantCount:
          type: integer
          minimum: 0
          maximum: 4

    FeedbackRequest:
      type: object
      additionalProperties: false
      required: [outcome, reason]
      properties:
        outcome:
          $ref: "#/components/schemas/FeedbackOutcome"
        reason:
          $ref: "#/components/schemas/FeedbackReason"
        message:
          type: string
          maxLength: 2000
        roomId:
          $ref: "./schemas/common.schema.json#/$defs/RoomId"
        participantRole:
          type: string
          enum: [HOST, GUEST]
        relatedCorrelationId:
          type: string
          format: uuid
        metadata:
          $ref: "#/components/schemas/FeedbackClientMetadata"

    FeedbackResponse:
      type: object
      additionalProperties: false
      required: [feedbackId, correlationId, receivedAt]
      properties:
        feedbackId:
          type: string
          format: uuid
        correlationId:
          type: string
          format: uuid
        receivedAt:
          type: string
          format: date-time

    FeedbackTriageStatus:
      type: string
      enum: [NEW, REVIEWING, RESOLVED, IGNORED]

    FeedbackSeverity:
      type: string
      enum: [UNSET, LOW, MEDIUM, HIGH, BLOCKER]

    FeedbackTriageRequest:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/FeedbackTriageStatus"
        severity:
          $ref: "#/components/schemas/FeedbackSeverity"
        assignee:
          type: string
          maxLength: 120
        note:
          type: string
          maxLength: 1000

    FeedbackReportSummary:
      type: object
      additionalProperties: false
      required:
        - feedbackId
        - correlationId
        - receivedAt
        - outcome
        - reason
        - triageStatus
        - severity
      properties:
        feedbackId:
          type: string
          format: uuid
        correlationId:
          type: string
        receivedAt:
          type: string
          format: date-time
        outcome:
          $ref: "#/components/schemas/FeedbackOutcome"
        reason:
          $ref: "#/components/schemas/FeedbackReason"
        roomId:
          $ref: "./schemas/common.schema.json#/$defs/RoomId"
        participantRole:
          type: string
          enum: [HOST, GUEST]
        relatedCorrelationId:
          type: string
          format: uuid
        triageStatus:
          $ref: "#/components/schemas/FeedbackTriageStatus"
        severity:
          $ref: "#/components/schemas/FeedbackSeverity"
        assignee:
          type: string
          maxLength: 120
        messagePreview:
          type: string
          maxLength: 160

    FeedbackReport:
      type: object
      additionalProperties: false
      required:
        - feedbackId
        - correlationId
        - receivedAt
        - outcome
        - reason
        - triageStatus
        - severity
      properties:
        feedbackId:
          type: string
          format: uuid
        correlationId:
          type: string
        receivedAt:
          type: string
          format: date-time
        outcome:
          $ref: "#/components/schemas/FeedbackOutcome"
        reason:
          $ref: "#/components/schemas/FeedbackReason"
        message:
          type: string
          maxLength: 2000
        roomId:
          $ref: "./schemas/common.schema.json#/$defs/RoomId"
        participantRole:
          type: string
          enum: [HOST, GUEST]
        relatedCorrelationId:
          type: string
          format: uuid
        metadata:
          $ref: "#/components/schemas/FeedbackClientMetadata"
        triageStatus:
          $ref: "#/components/schemas/FeedbackTriageStatus"
        severity:
          $ref: "#/components/schemas/FeedbackSeverity"
        assignee:
          type: string
          maxLength: 120
        triageNote:
          type: string
          maxLength: 1000
        triagedAt:
          type: string
          format: date-time

    FeedbackReportListResponse:
      type: object
      additionalProperties: false
      required: [listedAt, count, reports]
      properties:
        listedAt:
          type: string
          format: date-time
        count:
          type: integer
          minimum: 0
        reports:
          type: array
          items:
            $ref: "#/components/schemas/FeedbackReportSummary"

    FeedbackReportExportResponse:
      type: object
      additionalProperties: false
      required: [exportedAt, count, reports]
      properties:
        exportedAt:
          type: string
          format: date-time
        count:
          type: integer
          minimum: 0
        reports:
          type: array
          items:
            $ref: "#/components/schemas/FeedbackReport"

    TelemetryEventType:
      type: string
      enum:
        - FIRST_FRAME
        - PLAYBACK_ERROR
        - PUBLISH_START
        - PUBLISH_FAILURE
        - QUALITY_SUMMARY
        - RECOVERY_REQUESTED
        - RECOVERY_STARTED
        - RECOVERY_SUCCEEDED
        - RECOVERY_FAILURE

    TelemetryQualityStatus:
      type: string
      enum: [GOOD, WARNING, POOR, LOST, UNKNOWN]

    TelemetryEvent:
      type: object
      additionalProperties: false
      required: [type]
      properties:
        type:
          $ref: "#/components/schemas/TelemetryEventType"
        roomId:
          $ref: "./schemas/common.schema.json#/$defs/RoomId"
        role:
          type: string
          enum: [HOST, GUEST]
        qualityStatus:
          $ref: "#/components/schemas/TelemetryQualityStatus"
        detail:
          type: string
          maxLength: 200

    TelemetryRequest:
      type: object
      additionalProperties: false
      required: [events]
      properties:
        events:
          type: array
          minItems: 1
          maxItems: 50
          items:
            $ref: "#/components/schemas/TelemetryEvent"

    TelemetryResponse:
      type: object
      additionalProperties: false
      required: [telemetryId, correlationId, receivedAt, accepted]
      properties:
        telemetryId:
          type: string
          format: uuid
        correlationId:
          type: string
          format: uuid
        receivedAt:
          type: string
          format: date-time
        accepted:
          type: integer
          minimum: 0

    RoomSnapshot:
      $ref: "./schemas/common.schema.json#/$defs/RoomSnapshot"

    Participant:
      $ref: "./schemas/common.schema.json#/$defs/Participant"

    CreateRoomRequest:
      type: object
      additionalProperties: false
      required: [hostDisplayName]
      properties:
        hostDisplayName:
          $ref: "./schemas/common.schema.json#/$defs/DisplayName"

    CreateRoomResponse:
      type: object
      additionalProperties: false
      required: [room, hostSecret, invitePath]
      properties:
        room:
          $ref: "#/components/schemas/RoomSnapshot"
        hostSecret:
          type: string
          readOnly: true
          minLength: 43
          maxLength: 128
          pattern: ^[A-Za-z0-9_-]+$
        invitePath:
          type: string
          pattern: ^/rooms/[A-Za-z0-9_-]{22}$
          description: Guest URL path без host secret.

    JoinRoomRequest:
      type: object
      additionalProperties: false
      required: [displayName]
      properties:
        displayName:
          $ref: "./schemas/common.schema.json#/$defs/DisplayName"

    JoinRoomResponse:
      type: object
      additionalProperties: false
      required: [participant, room]
      properties:
        participant:
          $ref: "#/components/schemas/Participant"
        room:
          $ref: "#/components/schemas/RoomSnapshot"

    GetRoomResponse:
      type: object
      additionalProperties: false
      required: [participant, room]
      properties:
        participant:
          $ref: "#/components/schemas/Participant"
        room:
          $ref: "#/components/schemas/RoomSnapshot"

    LiveKitTokenResponse:
      type: object
      additionalProperties: false
      required:
        - token
        - liveKitUrl
        - roomName
        - participantId
        - participantIdentity
        - role
        - canPublish
        - canPublishData
        - expiresAt
      properties:
        token:
          type: string
          minLength: 20
          description: Signed LiveKit JWT. Нельзя логировать или кэшировать.
        liveKitUrl:
          type: string
          pattern: ^wss?://
          description: Browser-facing LiveKit URL.
        roomName:
          $ref: "./schemas/common.schema.json#/$defs/RoomId"
        participantId:
          type: string
          format: uuid
        participantIdentity:
          type: string
          minLength: 1
          maxLength: 128
        role:
          type: string
          enum: [HOST, GUEST]
        canPublish:
          type: boolean
        canPublishData:
          type: boolean
        expiresAt:
          type: string
          format: date-time

    EmailChallengeRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
          description: |
            Адрес нужен только будущему email provider и account storage; не
            возвращается в public room, invite или telemetry response.

    EmailChallengeAccepted:
      type: object
      additionalProperties: false
      required: [challengeId, expiresAt]
      properties:
        challengeId:
          type: string
          format: uuid
        expiresAt:
          type: string
          format: date-time

    VerifyEmailChallengeRequest:
      type: object
      additionalProperties: false
      required: [code]
      properties:
        code:
          type: string
          minLength: 6
          maxLength: 12
          pattern: ^[A-Za-z0-9]+$
          writeOnly: true
          description: Одноразовый код; не логируется и не возвращается.
        displayName:
          $ref: "./schemas/common.schema.json#/$defs/DisplayName"

    AccountProfile:
      type: object
      additionalProperties: false
      required: [accountId, displayName, createdAt]
      properties:
        accountId:
          type: string
          format: uuid
        displayName:
          $ref: "./schemas/common.schema.json#/$defs/DisplayName"
        createdAt:
          type: string
          format: date-time

    PublicRoomStatus:
      type: string
      enum: [OPEN, CLOSED, EXPIRED]

    PublicMembershipRole:
      type: string
      enum: [OWNER, GUEST]

    PublicRoom:
      type: object
      additionalProperties: false
      required: [publicRoomId, status, memberLimit, createdAt, expiresAt]
      properties:
        publicRoomId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/PublicRoomStatus"
        memberLimit:
          type: integer
          const: 4
          description: "Текущий product limit: owner и до трёх guest-ов."
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time

    PublicRoomMembership:
      type: object
      additionalProperties: false
      required: [role, joinedAt]
      properties:
        role:
          $ref: "#/components/schemas/PublicMembershipRole"
        joinedAt:
          type: string
          format: date-time

    PublicRoomAccess:
      type: object
      additionalProperties: false
      required: [room, membership]
      properties:
        room:
          $ref: "#/components/schemas/PublicRoom"
        membership:
          $ref: "#/components/schemas/PublicRoomMembership"

    CreatePublicRoomRequest:
      type: object
      additionalProperties: false
      required: [expiresInMinutes]
      properties:
        expiresInMinutes:
          type: integer
          minimum: 10
          maximum: 1440
          description: Public room не является persistent viewing history.

    CreatePublicInviteRequest:
      type: object
      additionalProperties: false
      required: [expiresInMinutes, maxRedemptions]
      properties:
        expiresInMinutes:
          type: integer
          minimum: 5
          maximum: 10080
        maxRedemptions:
          type: integer
          minimum: 1
          maximum: 3

    PublicInviteCreated:
      type: object
      additionalProperties: false
      required: [inviteId, invitePath, expiresAt, maxRedemptions]
      properties:
        inviteId:
          type: string
          format: uuid
        invitePath:
          type: string
          pattern: ^/join#invite=[A-Za-z0-9_-]{43}$
          description: |
            Browser route с raw token в fragment. Fragment не отправляется HTTP
            server-у; frontend передаёт token только в POST body redemption.
        expiresAt:
          type: string
          format: date-time
        maxRedemptions:
          type: integer
          minimum: 1
          maximum: 3

    RedeemPublicInviteRequest:
      type: object
      additionalProperties: false
      required: [inviteToken]
      properties:
        inviteToken:
          type: string
          minLength: 43
          maxLength: 43
          pattern: ^[A-Za-z0-9_-]{43}$
          writeOnly: true
          description: 32 random bytes Base64 URL без padding; в storage хранится только hash.

    ProblemDetails:
      $ref: "./schemas/problem-details.schema.json"

  responses:
    BadRequest:
      description: Некорректный JSON или формат запроса
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    Unauthorized:
      description: Требуемая session credential отсутствует или недействительна
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    ChallengeRejected:
      description: Challenge или code недействителен либо истёк; ответ не раскрывает причину
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    Forbidden:
      description: Участник не имеет права выполнить операцию
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    RoomUnavailable:
      description: Комната недоступна; ответ не раскрывает, существовала ли она
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    MembershipRequired:
      description: Public room недоступна без active membership; ответ не раскрывает её существование или owner-а
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    InviteUnavailable:
      description: Invite недоступен; ответ не раскрывает, был ли token неверен, истёк, отозван или исчерпан
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    NotFound:
      description: Ресурс не найден или уже удалён по retention policy
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    Conflict:
      description: Конфликт состояния, idempotency key или лимита участников
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    AccountLimitReached:
      description: Account или room достигла безопасного product limit
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    ValidationFailed:
      description: Запрос не прошёл предметную валидацию
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    RateLimited:
      description: Превышен допустимый темп запросов
      headers:
        Retry-After:
          schema:
            type: integer
            minimum: 1
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    InternalError:
      description: Внутренняя ошибка без раскрытия реализации
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
