name: Desktop installer

on:
  workflow_dispatch:
    inputs:
      signed:
        description: "Собрать подписанные release installers (требует production secrets)"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  macos:
    name: macOS DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.0
      - name: Установить зависимости
        run: pnpm install --frozen-lockfile
      - name: Собрать закреплённый LiveKit sidecar
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/livekit"
          GOBIN="$RUNNER_TEMP/livekit" go install github.com/livekit/livekit-server/cmd/server@v1.13.3
          mv "$RUNNER_TEMP/livekit/server" "$RUNNER_TEMP/livekit/livekit-server"
          "$RUNNER_TEMP/livekit/livekit-server" --version
      - name: Подготовить sidecars
        run: pnpm desktop:sidecars:stage -- --runtime "$JAVA_HOME" --livekit "$RUNNER_TEMP/livekit/livekit-server"
      - name: Собрать React UI и backend jar
        run: pnpm desktop:prepare
      - name: Проверить packaging inputs
        run: node scripts/desktop-package-preflight.mjs --platform mac
      - name: Проверить credentials для signed DMG
        if: ${{ inputs.signed }}
        run: node scripts/desktop-signing-preflight.mjs --platform mac
        env:
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: Собрать preview DMG
        if: ${{ !inputs.signed }}
        run: pnpm --dir desktop exec electron-builder --mac dmg zip --${{ matrix.arch }} -c.mac.forceCodeSigning=false -c.mac.identity=null -c.mac.hardenedRuntime=false
      - name: Собрать signed и notarized DMG
        if: ${{ inputs.signed }}
        run: pnpm --dir desktop exec electron-builder --mac dmg zip --${{ matrix.arch }}
        env:
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: Смонтировать и проверить установленный DMG
        shell: bash
        run: |
          set -euo pipefail
          artifacts=(desktop/release/Spectemus-Simul-*-mac-${{ matrix.arch }}.dmg)
          test "${#artifacts[@]}" -eq 1
          test -f "${artifacts[0]}"
          mountpoint="$RUNNER_TEMP/spectemus-install-smoke"
          mkdir "$mountpoint"
          hdiutil attach "${artifacts[0]}" -nobrowse -readonly -mountpoint "$mountpoint"
          trap 'hdiutil detach "$mountpoint" -quiet || true' EXIT
          node scripts/desktop-installed-app-smoke.mjs --platform mac --app "$mountpoint/Spectemus Simul.app"
      - uses: actions/upload-artifact@v7
        with:
          name: spectemus-simul-macos-${{ matrix.arch }}-${{ github.run_id }}
          path: desktop/release/
          if-no-files-found: error
          retention-days: 14

  windows:
    name: Windows NSIS
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Установить зависимости
        run: pnpm install --frozen-lockfile
      - name: Получить LiveKit sidecar
        shell: pwsh
        run: |
          $archive = "$env:RUNNER_TEMP\livekit.zip"
          Invoke-WebRequest "https://github.com/livekit/livekit/releases/download/v1.13.3/livekit_1.13.3_windows_amd64.zip" -OutFile $archive
          $actualHash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          $expectedHash = "d29786e63a11de390fb8051191a30520cfb687d8f6cb5063b6ef0f748f029727"
          if ($actualHash -ne $expectedHash) { throw "LiveKit archive SHA-256 не совпал с official v1.13.3 checksums.txt." }
          Expand-Archive $archive -DestinationPath "$env:RUNNER_TEMP\livekit"
          $livekit = (Get-ChildItem "$env:RUNNER_TEMP\livekit" -Filter livekit-server.exe -Recurse | Select-Object -First 1).FullName
          if (-not $livekit) { throw "LiveKit Server не найден в official release archive." }
          pnpm desktop:sidecars:stage -- --runtime "$env:JAVA_HOME" --livekit "$livekit"
      - name: Собрать React UI и backend jar
        run: pnpm desktop:prepare
      - name: Проверить packaging inputs
        run: node scripts/desktop-package-preflight.mjs --platform win
      - name: Проверить credentials для signed NSIS
        if: ${{ inputs.signed }}
        run: node scripts/desktop-signing-preflight.mjs --platform win
        env:
          WIN_CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
      - name: Собрать preview NSIS
        if: ${{ !inputs.signed }}
        run: pnpm desktop:package:preview:win
      - name: Собрать signed NSIS
        if: ${{ inputs.signed }}
        run: pnpm desktop:package:win
        env:
          WIN_CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
      - name: Установить и проверить NSIS
        shell: pwsh
        run: |
          $artifacts = @(Get-ChildItem desktop/release -Filter "Spectemus-Simul-*-win-x64.exe")
          if ($artifacts.Count -ne 1) { throw "Ожидался один Windows NSIS installer." }
          $installPath = Join-Path $env:RUNNER_TEMP "spectemus-install-smoke"
          try {
            $installer = Start-Process -FilePath $artifacts[0].FullName -ArgumentList @("/S", "/D=$installPath") -Wait -PassThru
            if ($installer.ExitCode -ne 0) { throw "NSIS installer завершился с кодом $($installer.ExitCode)." }
            node scripts/desktop-installed-app-smoke.mjs --platform win --app $installPath
          } finally {
            $uninstaller = Join-Path $installPath "Uninstall Spectemus Simul.exe"
            if (Test-Path $uninstaller) {
              $uninstallerProcess = Start-Process -FilePath $uninstaller -ArgumentList "/S" -Wait -PassThru
              if ($uninstallerProcess.ExitCode -ne 0) { throw "NSIS uninstaller завершился с кодом $($uninstallerProcess.ExitCode)." }
            }
            if (Test-Path $installPath) {
              Remove-Item $installPath -Recurse -Force
            }
          }
      - uses: actions/upload-artifact@v7
        with:
          name: spectemus-simul-windows-${{ github.run_id }}
          path: desktop/release/
          if-no-files-found: error
          retention-days: 14
