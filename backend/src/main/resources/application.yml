spring:
  application:
    name: watch-together-backend
  jackson:
    deserialization:
      fail-on-unknown-properties: true
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:watch_together_redis_dev_only}

server:
  port: 8080

watch-together:
  rooms:
    ttl: ${ROOM_TTL:4h}
    session-cookie-secure: ${SESSION_COOKIE_SECURE:false}
    cleanup-grace: ${ROOM_CLEANUP_GRACE:5m}
  websocket:
    presence-ttl: ${WEBSOCKET_PRESENCE_TTL:30s}
    chat-rate-limit: ${WEBSOCKET_CHAT_RATE_LIMIT:5}
    chat-rate-window: ${WEBSOCKET_CHAT_RATE_WINDOW:5s}
    host-reconnect-grace: ${WEBSOCKET_HOST_RECONNECT_GRACE:60s}
  livekit:
    url: ${LIVEKIT_URL:ws://127.0.0.1:7880}
    api-key: ${LIVEKIT_API_KEY:devkey}
    api-secret: ${LIVEKIT_API_SECRET:devsecretdevsecretdevsecretdevsecret}
    token-ttl: ${LIVEKIT_TOKEN_TTL:10m}

management:
  endpoints:
    web:
      exposure:
        # metrics/prometheus are for internal scraping — keep them behind the security
        # chain (not in SecurityConfig permitAll) and/or a separate management port.
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
