# Security response headers for the Watch Together frontend.
# CSP notes: the Vite build emits only external scripts (script-src 'self' is safe);
# inline style attributes (React style={{…}}) require style-src 'unsafe-inline';
# connect-src allows ws:/wss: for the room WebSocket and the LiveKit signaling channel
# (a fixed deployment should narrow this to its LiveKit host). WebRTC media (UDP) is not
# governed by CSP. blob: is needed for the host's local-file preview / captured media.
add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: blob:; media-src 'self' blob:; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' ws: wss:" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "no-referrer" always;
add_header Permissions-Policy "microphone=(self), camera=(), display-capture=(), geolocation=(), payment=()" always;
