name: watch-together

services:
  postgres:
    image: postgres:18.4-alpine3.23
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-watch_together}"
      POSTGRES_USER: "${POSTGRES_USER:-watch_together}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-watch_together_dev_only}"
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:8.8.0-alpine3.23
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - "${REDIS_PASSWORD:-watch_together_redis_dev_only}"
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:-watch_together_redis_dev_only}"
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'REDISCLI_AUTH="$$REDIS_PASSWORD" redis-cli ping | grep -q PONG',
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  livekit:
    build:
      context: ..
      dockerfile: infra/livekit/Dockerfile
    command:
      [
        "--config",
        "/etc/livekit.yaml",
        "--node-ip",
        "${LIVEKIT_NODE_IP:-127.0.0.1}",
      ]
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-devsecretdevsecretdevsecretdevsecret}"
      REDIS_HOST: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-watch_together_redis_dev_only}"
    ports:
      - "127.0.0.1:${LIVEKIT_HTTP_PORT:-7880}:7880"
      - "127.0.0.1:${LIVEKIT_TCP_PORT:-7881}:7881"
      - "${LIVEKIT_UDP_PORT_START:-50000}-${LIVEKIT_UDP_PORT_END:-50100}:50000-50100/udp"
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit.yaml:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7880/"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: "local"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-watch_together_redis_dev_only}"
      ROOM_TTL: "${ROOM_TTL:-4h}"
      ROOM_CLEANUP_GRACE: "${ROOM_CLEANUP_GRACE:-5m}"
      SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-false}"
      WEBSOCKET_PRESENCE_TTL: "${WEBSOCKET_PRESENCE_TTL:-30s}"
      WEBSOCKET_CHAT_RATE_LIMIT: "${WEBSOCKET_CHAT_RATE_LIMIT:-5}"
      WEBSOCKET_CHAT_RATE_WINDOW: "${WEBSOCKET_CHAT_RATE_WINDOW:-5s}"
      WEBSOCKET_HOST_RECONNECT_GRACE: "${WEBSOCKET_HOST_RECONNECT_GRACE:-60s}"
      LIVEKIT_URL: "${LIVEKIT_URL:-ws://127.0.0.1:${LIVEKIT_HTTP_PORT:-7880}}"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY:-devkey}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET:-devsecretdevsecretdevsecretdevsecret}"
      LIVEKIT_TOKEN_TTL: "${LIVEKIT_TOKEN_TTL:-10m}"
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'wget -qO- http://127.0.0.1:8080/actuator/health | grep -q ''"status":"UP"''',
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  gateway:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_LIVEKIT_URL: "${PUBLIC_LIVEKIT_URL:-ws://127.0.0.1:${LIVEKIT_HTTP_PORT:-7880}}"
    ports:
      - "127.0.0.1:${APP_PORT:-8088}:80"
    depends_on:
      backend:
        condition: service_healthy
      livekit:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/gateway-health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
